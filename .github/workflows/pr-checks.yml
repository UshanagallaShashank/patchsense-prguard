name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Label PR by changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  size-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file line limits
        run: |
          OVER_LIMIT=0
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 300 ]; then
              echo "WARN: $file has $lines lines (limit: 300)"
              OVER_LIMIT=1
            fi
          done < <(git diff --name-only --diff-filter=ACM origin/main...HEAD | grep '\.py$')
          if [ "$OVER_LIMIT" -eq 1 ]; then
            echo "Some Python files exceed the 300-line limit. Please split them."
          fi
