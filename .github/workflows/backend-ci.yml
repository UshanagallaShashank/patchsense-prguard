name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: patchsense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install ruff "mypy[pydantic]" pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app --config-file mypy.ini

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/patchsense_test
          REDIS_URL: redis://localhost:6379
          GITHUB_APP_ID: test
          GITHUB_PRIVATE_KEY_PATH: ./tests/fixtures/test-key.pem
          GITHUB_WEBHOOK_SECRET: test-secret
          GEMINI_API_KEY: test
          LANGCHAIN_API_KEY: test
          LANGCHAIN_TRACING_V2: "false"
        run: pytest tests/ -v
